<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Treasure of Love</title>

<link rel="stylesheet" href="style.css">

<style>

body{
    margin:0;
    padding:0;
    background:linear-gradient(to bottom,#050510,#0f1020,#1a1030);
    overflow:hidden;
    font-family:Tahoma,sans-serif;
    color:white;
}

.stars{
    position:fixed;
    width:100%;
    height:100%;
    background:url("https://www.transparenttextures.com/patterns/stardust.png");
    animation:moveStars 80s linear infinite;
    opacity:.5;
}

@keyframes moveStars{
    from{background-position:0 0;}
    to{background-position:0 1000px;}
}

.container{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:90%;
    text-align:center;
}

.logo{
    font-size:3rem;
    color:#ff4f81;
    text-shadow:0 0 20px #ff4f81;
    opacity:0;
    animation:showTitle 3s forwards;
}

@keyframes showTitle{
    from{
        opacity:0;
        transform:translateY(-30px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.message{
    margin-top:25px;
    font-size:1.2rem;
    line-height:2;
    opacity:0;
    animation:fadeText 3s forwards;
    animation-delay:3s;
}

@keyframes fadeText{
    to{
        opacity:1;
    }
}

.startBtn{
    margin-top:40px;
    padding:15px 35px;
    border:none;
    border-radius:30px;
    font-size:1.1rem;
    background:#ff4f81;
    color:white;
    cursor:pointer;
    opacity:0;
    animation:showBtn 2s forwards;
    animation-delay:8s;
    box-shadow:0 0 20px #ff4f81;
}

@keyframes showBtn{
    to{
        opacity:1;
    }
}

.startBtn:hover{
    transform:scale(1.05);
}

.heart{
    position:absolute;
    color:#ff4f81;
    animation:floatUp linear infinite;
    opacity:.4;
}

@keyframes floatUp{
    from{
        transform:translateY(100vh);
    }
    to{
        transform:translateY(-100px);
    }
}

.footer{
    position:absolute;
    bottom:20px;
    width:100%;
    text-align:center;
    font-size:.8rem;
    opacity:.5;
}

</style>

</head>
<body>

<div class="stars"></div>

<div class="container">

    <h1 class="logo">💎 Treasure of Love 💎</h1>

    <div class="message">
        ليس كل كنزٍ يُعثر عليه بسهولة...<br>
        بعض الكنوز تحتاج رحلة طويلة من الذكريات والألغاز والمشاعر ❤️<br><br>

        أمامك 20 مرحلة...<br>
        وكل مرحلة تقربك أكثر من الكنز الحقيقي 💎
    </div>

    <button class="startBtn" onclick="startJourney()">
        ابدأ الرحلة ❤️
    </button>

</div>

<div class="footer">
    Treasure of Love
</div>

<audio id="bgMusic" loop>
    <source src="audio/calm.mp3" type="audio/mpeg">
</audio>

<script>

const music = document.getElementById("bgMusic");

document.body.addEventListener("click",()=>{

    music.play();

},{once:true});

function startJourney(){

    window.location.href="level1.html";

}

function createHeart(){

    const heart=document.createElement("div");

    heart.classList.add("heart");

    heart.innerHTML="❤";

    heart.style.left=Math.random()*100+"vw";

    heart.style.fontSize=(15+Math.random()*25)+"px";

    heart.style.animationDuration=(8+Math.random()*8)+"s";

    document.body.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },16000);

}

setInterval(createHeart,800);

</script>

</body>
</html>
