<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Treasure of Love - البداية</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="stars"></div>

<div class="container">

    <!-- العنوان -->
    <div class="header">

        <h1 class="game-title" onclick="secretHeart()">
            💎 Treasure of Love
        </h1>

        <div class="level-number">
            بداية الرحلة
        </div>

        <div class="level-name">
            ❤️ قصة حب + ألغاز + ذكريات
        </div>

    </div>

    <!-- قصة البداية -->
    <div class="story-box">

        هذه ليست مجرد لعبة…  
        بل رحلة بين القلب والعقل والذكريات 💖

        <br><br>

        كل مرحلة تكشف جزء من الحقيقة…  
        وكل جواب يقربك أكثر من النهاية.

    </div>

    <!-- زر تشغيل الموسيقى -->
    <button class="btn btn-primary" onclick="startGame()">
        ابدأ الرحلة 🎵
    </button>

    <br><br>

    <!-- زر دخول المرحلة الأولى -->
    <button class="btn btn-next" onclick="goTo('level1.html')">
        دخول المرحلة الأولى ❤️
    </button>

</div>

<!-- سكربتات -->
<script src="script.js"></script>

<script>

// 🎮 بدء اللعبة (تشغيل موسيقى + تأثير)
function startGame(){

    startMusic(); // من script.js

    showWelcome();

}

// 💖 رسالة ترحيب بسيطة
function showWelcome(){

    alert("أهلاً بيك في رحلة Treasure of Love ❤️🔥");

}

// 🔐 سر بسيط (اختياري)
function secretHeart(){

    console.log("💖 الحب هو المفتاح الحقيقي");

}

// 🚀 الانتقال بين الصفحات
function goTo(page){

    window.location.href = page;

}

</script>

</body>
</html>
